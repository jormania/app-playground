  <g stroke="#c9a44c" stroke-width="9" stroke-linecap="round" opacity="0.95">
    <line x1="146" y1="176" x2="146" y2="336"/>
    <line x1="201" y1="176" x2="201" y2="336"/>
    <line x1="256" y1="176" x2="256" y2="336"/>
