<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Wanderlist">
  <!-- Warm dark canvas (full-bleed, so it survives a maskable crop) -->
  <rect width="512" height="512" rx="112" fill="#111c26"/>
  <!-- A map pin = a place; the check inside = triaged / ticked off. Deliberately NOT a
       compass (Sol Odyssey owns that motif) — this is Wanderlist's own "a place, dealt with"
       identity. The pin sits inside the ~80% maskable safe zone. -->
  <path d="M256 104 C186 104 132 158 132 228 C132 312 220 360 256 434 C292 360 380 312 380 228 C380 158 326 104 256 104 Z" fill="#d59a4a"/>
  <circle cx="256" cy="224" r="62" fill="#f3ecda"/>
  <path d="M228 224 l20 22 l40 -46" fill="none" stroke="#a9741f" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
