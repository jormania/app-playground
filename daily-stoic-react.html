<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daily Stoic — wisdom and reflections</title>
  <meta name="description" content="A daily Stoic companion displaying public domain quotes and a journal for reflections." />
  <meta name="theme-color" content="#f4f5f7" />
  <script>
    // Apply the saved theme before first paint to avoid a flash.
    try {
      var p = localStorage.getItem('daily-stoic:theme') || 'system';
      var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', '#0e1115');
      }
    } catch (e) {}
  </script>
  <link rel="icon" type="image/svg+xml" href="/daily-stoic-logo.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/daily-stoic-favicon-32.png" />
  <link rel="apple-touch-icon" href="/daily-stoic-icon-192.png" />
  <link rel="manifest" href="/daily-stoic.webmanifest" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/daily-stoic/main.tsx"></script>
</body>
</html>
