<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KB Pop Art</title>
    <style>
        :root {
            --haring-yellow: #FFFF00;
            --haring-red: #E60000; /* Darkened slightly for WCAG AA compliance on white */
            --haring-blue: #0000FF;
            --haring-white: #FFFFFF;
            --haring-black: #000000;
            --border-heavy: 5px solid var(--haring-black);
            --border-medium: 3px solid var(--haring-black);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--haring-yellow);
            color: var(--haring-black);
            padding: 0 16px 64px 16px;
            line-height: 1.5;
        }

        header {
            position: sticky;
            top: 0;
            left: 0;
            width: calc(100% + 32px);
            margin-left: -16px;
            z-index: 100;
            background: var(--haring-white);
            border-bottom: var(--border-heavy);
            box-shadow: 0px 6px 0px rgba(0,0,0,0.2);
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
            padding: 12px 0 8px 0;
        }

        nav {
            display: flex;
            overflow-x: auto;
            overscroll-behavior-x: contain;
            scroll-snap-type: x mandatory;
            gap: 8px;
            padding: 12px 16px;
            background: var(--haring-yellow);
            border-top: var(--border-medium);
            scrollbar-width: none;
        }
        
        nav::-webkit-scrollbar {
            display: none;
        }

        nav a {
            scroll-snap-align: start;
            flex: 0 0 auto;
            text-decoration: none;
            color: var(--haring-black);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.95rem;
            padding: 12px 16px;
            min-height: 48px; /* Material Design standard tap target */
            display: flex;
            align-items: center;
            background: var(--haring-white);
            border: var(--border-medium);
            transition: background 0.1s;
        }

        nav a:active {
            background: var(--haring-red);
            color: var(--haring-white);
        }

        /* Spacer for initial load below sticky header */
        .header-spacer {
            height: 24px;
        }

        .card {
            background: var(--haring-white);
            border: var(--border-heavy);
            padding: 20px;
            margin-bottom: 32px;
            box-shadow: 8px 8px 0px var(--haring-black);
            position: relative;
            scroll-margin-top: 160px; /* Prevents sticky header from covering card on anchor jump */
        }

        .card:nth-child(even) .visual-box { background: var(--haring-yellow); }
        .card:nth-child(odd) .visual-box { background: var(--haring-blue); }

        .tagline {
            font-size: 1.2rem;
            font-weight: 800;
            font-style: italic;
            color: var(--haring-red);
            margin-bottom: 12px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: var(--border-medium);
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        .exercise-title {
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            max-width: 70%;
            line-height: 1;
        }

        .rating {
            display: flex;
            gap: 4px;
        }

        .rating svg { width: 32px; height: 32px; }

        .visual-box {
            border: var(--border-heavy);
            padding: 16px;
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .pose { width: 100px; height: 100px; }

        .steps {
            list-style: none;
            margin-bottom: 20px;
        }

        .steps li {
            position: relative;
            padding-left: 32px;
            margin-bottom: 14px;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .steps li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 6px;
            width: 16px;
            height: 16px;
            background: var(--haring-red);
            border: 3px solid var(--haring-black);
            border-radius: 50%;
        }

        .target-muscles {
            display: inline-block;
            background: var(--haring-black);
            color: var(--haring-white);
            padding: 8px 12px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
    </style>
</head>
