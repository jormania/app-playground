<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tempo — timers for body & mind</title>
  <meta name="description" content="Gentle timers for movement, focus, and breath — a calm daily cadence for body and mind. Rounds, Cycles, Sit–Walk, 4-7-8, Box Breathing, and your own custom sequences." />
  <meta name="theme-color" content="#F4F6F3" />
  <script>
    // Apply the saved theme before first paint (shared with the guide) to avoid a flash.
    try {
      var p = localStorage.getItem('tempo:theme');
      var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', '#12151A');
      }
    } catch (e) {}
  </script>
  <link rel="icon" type="image/svg+xml" href="/tempo-logo.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/tempo-favicon-32.png" />
  <link rel="apple-touch-icon" href="/tempo-icon-192.png" />
  <link rel="manifest" href="/tempo.webmanifest" />
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/tempo/main.jsx"></script>
</body>
</html>
