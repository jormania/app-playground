<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sol Odyssey</title>
  <meta name="description" content="Run your own six-week behaviour-change Odyssey: one behaviour, 42 days, witnessed by a buddy. Your records live in your own Notion." />
  <meta name="theme-color" content="#4B45C6" />
  <script>
    // Apply the saved theme before first paint (shared with the field guide) to avoid a flash.
    try {
      var p = localStorage.getItem('sol-odyssey:theme');
      var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', '#121127');
      }
    } catch (e) {}
  </script>
  <link rel="icon" type="image/svg+xml" href="/sol-odyssey-logo.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/sol-odyssey-favicon-32.png" />
  <link rel="apple-touch-icon" href="/sol-odyssey-icon-192.png" />
  <link rel="manifest" href="/sol-odyssey.webmanifest" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/sol-odyssey/main.tsx"></script>
</body>
</html>
