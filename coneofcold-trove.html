<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Coneofcold Trove</title>
  <meta name="description" content="Every Cone of Cold React app, one launch pad." />
  <meta name="theme-color" content="#eaf6fc" />
  <script>
    // Apply the saved theme before first paint to avoid a flash.
    try {
      if (localStorage.getItem('trove:theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', '#0e2a3d');
      }
    } catch (e) {}
  </script>
  <link rel="icon" type="image/svg+xml" href="/trove-logo.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/trove-favicon-32.png" />
  <link rel="apple-touch-icon" href="/trove-icon-192.png" />
  <link rel="manifest" href="/coneofcold-trove.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Trove" />
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/trove/main.jsx"></script>
</body>
</html>
