<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal of Delights</title>
  <meta name="description" content="One delight a day, noticed closely and written down." />
  <link rel="manifest" href="/journal-of-delights.webmanifest" />
  <meta name="theme-color" content="#002b36" />
  <script>
    // Apply the saved theme before paint to avoid a flash of the wrong palette.
    try {
      var t = localStorage.getItem('jod_theme') === 'light' ? 'light' : 'dark';
      document.documentElement.dataset.theme = t;
      document.querySelector('meta[name="theme-color"]').setAttribute('content', t === 'light' ? '#fdf6e3' : '#002b36');
    } catch (e) {}
  </script>
  <link rel="icon" href="/journal-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/journal-icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Journal of Delights" />
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/journal/main.jsx"></script>
</body>
</html>
